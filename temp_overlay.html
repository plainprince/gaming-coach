<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgba(0, 0, 0, 0.25);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      padding: 15px;
      border-radius: 10px;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    .message {
      word-wrap: break-word;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="message">I am ready to assist you with your development work.</div>
</body>
</html>
